name: Beal Search Daily

on:
  schedule:
    - cron: '0 6 * * *'   # Runs daily at 6 AM UTC
  workflow_dispatch:        # Allows manual run from GitHub UI

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6 hours (GitHub free tier max)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Beal Search
        run: python beal_search.py

      - name: Commit progress
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add beal_state.json beal_results.jsonl
          git diff --staged --quiet || git commit -m "Auto checkpoint: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
